name: Scheduled tasks

# Drives the app's scheduling from GitHub's free cron instead of an always-on
# in-process scheduler, so the app can live on a free host that sleeps.
# Each run wakes the service (/healthz) then POSTs a trigger endpoint.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   APP_URL            e.g. https://outlook-activity-monitor.onrender.com  (no trailing slash)
#   TASK_TRIGGER_TOKEN the same value set as TASK_TRIGGER_TOKEN on the web service
#
# Cron is in UTC. 00:30 UTC = 06:00 IST (Asia/Kolkata, UTC+5:30).

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min  -> mailbox sync
    - cron: '30 0 * * *'     # 00:30 UTC / 06:00 IST -> daily report email
  workflow_dispatch:
    inputs:
      task:
        description: Task to run manually
        type: choice
        options:
          - sync
          - daily-report
        default: sync

# Never let two triggers overlap (a slow sync + the daily run colliding).
concurrency:
  group: scheduled-tasks
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Decide which task to run
        id: which
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            task="${{ github.event.inputs.task }}"
          elif [ "${{ github.event.schedule }}" = "30 0 * * *" ]; then
            task="daily-report"
          else
            task="sync"
          fi
          echo "task=$task" >> "$GITHUB_OUTPUT"
          echo "Running task: $task"

      - name: Check required secrets
        env:
          APP_URL: ${{ secrets.APP_URL }}
          TASK_TRIGGER_TOKEN: ${{ secrets.TASK_TRIGGER_TOKEN }}
        run: |
          missing=0
          # APP_URL must be a non-empty absolute http(s) URL — an empty or
          # scheme-less value produces a malformed URL that curl rejects with
          # exit code 3, which is exactly how this job used to fail silently.
          case "$APP_URL" in
            http://*|https://*) ;;
            "") echo "::error::Repository secret APP_URL is not set. Add it under Settings -> Secrets and variables -> Actions (as a Secret, not a Variable), e.g. https://outlook-activity-monitor.onrender.com"; missing=1 ;;
            *)  echo "::error::Repository secret APP_URL must start with http:// or https:// and have no surrounding quotes/spaces. Got a value that does not."; missing=1 ;;
          esac
          if [ -z "$TASK_TRIGGER_TOKEN" ]; then
            echo "::error::Repository secret TASK_TRIGGER_TOKEN is not set. It must match the TASK_TRIGGER_TOKEN configured on the web service."
            missing=1
          fi
          [ "$missing" = "0" ] || exit 1

      - name: Warm up the service
        run: |
          # Free hosts cold-start in ~30-60s, so a slow first response is
          # expected; keep retrying but don't fail the job if warm-up alone
          # doesn't succeed — the Trigger step below is the real gate.
          curl -fsS --max-time 120 --retry 6 --retry-all-errors --retry-delay 15 \
            "${{ secrets.APP_URL }}/healthz" \
            || echo "::warning::Warm-up request to /healthz did not succeed; proceeding to trigger anyway."

      - name: Trigger task
        run: |
          curl -fsS -X POST --max-time 600 --retry 3 --retry-all-errors --retry-delay 20 \
            -H "X-Task-Token: ${{ secrets.TASK_TRIGGER_TOKEN }}" \
            "${{ secrets.APP_URL }}/tasks/${{ steps.which.outputs.task }}"
