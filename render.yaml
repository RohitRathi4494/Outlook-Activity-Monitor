services:
  - type: web
    name: outlook-activity-monitor
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CLIENT_ID
        sync: false
      - key: TENANT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: REDIRECT_URI
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      # Shared secret the GitHub Actions cron presents to trigger /tasks/*.
      # Set this to the same value stored as the TASK_TRIGGER_TOKEN repo secret.
      - key: TASK_TRIGGER_TOKEN
        sync: false
      # Scheduling is driven by external cron (GitHub Actions), so the
      # in-process scheduler is turned off here — it can't run on a free
      # instance that sleeps between requests anyway.
      - key: ENABLE_INTERNAL_SCHEDULER
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: outlook-activity-monitor-db
          property: connectionString

databases:
  - name: outlook-activity-monitor-db
    plan: free
